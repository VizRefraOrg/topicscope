<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopicScope — Textual Data Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0f1118;color:#e0dce8;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:linear-gradient(180deg,rgba(18,16,30,0.98),rgba(15,17,24,0.95));border-bottom:1px solid rgba(100,80,200,0.15);z-index:20;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#ff8844,#cc44ff);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-0.02em}
.logo-sub{color:rgba(180,170,220,0.45);font-size:11px;margin-left:4px}
.header-right{display:flex;align-items:center;gap:12px}
.hint{color:rgba(180,170,220,0.4);font-size:11px}
.switcher{display:flex;gap:3px;background:rgba(40,30,80,0.4);border-radius:7px;padding:2px;border:1px solid rgba(100,80,200,0.15)}
.switcher button{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all 0.2s;background:transparent;color:rgba(180,170,220,0.6)}
.switcher button.active{background:linear-gradient(135deg,#6c44cc,#cc44ff);color:#fff}
.switcher button:hover:not(.active){color:#e0dce8}
#main{flex:1;display:flex;overflow:hidden}
#input-panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(18,16,30,0.95);border-right:1px solid rgba(100,80,200,0.12);z-index:10}
#input-panel.collapsed{width:0;overflow:hidden;border-right:none}
.panel-header{padding:16px 18px 12px;border-bottom:1px solid rgba(100,80,200,0.1)}
.panel-header h2{font-size:14px;font-weight:700;margin-bottom:10px}
.tabs{display:flex;gap:2px;background:rgba(40,30,80,0.3);border-radius:6px;padding:2px}
.tabs button{flex:1;padding:7px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:transparent;color:rgba(180,170,220,0.5);transition:all 0.2s}
.tabs button.active{background:rgba(100,80,200,0.3);color:#e0dce8}
.input-body{flex:1;padding:14px 18px;overflow-y:auto;display:flex;flex-direction:column}
#text-input{display:flex;flex-direction:column;flex:1}
#file-input{display:none;flex-direction:column;flex:1}
#text-input.active,#file-input.active{display:flex}
textarea{flex:1;min-height:200px;background:rgba(30,25,55,0.6);border:1px solid rgba(100,80,200,0.2);border-radius:8px;padding:12px;color:#e0dce8;font-family:inherit;font-size:13px;line-height:1.5;resize:none;outline:none}
textarea:focus{border-color:rgba(150,120,255,0.5)}
textarea::placeholder{color:rgba(140,130,180,0.4)}
.dropzone{flex:1;min-height:200px;border:2px dashed rgba(100,80,200,0.25);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all 0.2s;background:rgba(30,25,55,0.3)}
.dropzone:hover,.dropzone.dragover{border-color:rgba(150,120,255,0.6);background:rgba(100,80,200,0.08)}
.dropzone-icon{font-size:36px;opacity:0.4}.dropzone-text{font-size:13px;color:rgba(180,170,220,0.5)}.dropzone-sub{font-size:11px;color:rgba(140,130,180,0.35)}
#file-name{margin-top:10px;font-size:12px;color:#cc44ff;display:none}
#file-hidden{display:none}
.analyse-section{padding:14px 18px;border-top:1px solid rgba(100,80,200,0.1)}
#analyse-btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#6c44cc,#cc44ff);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s}
#analyse-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(150,80,255,0.3)}
#analyse-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.loading{display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px}.loading.active{display:flex}
.spinner{width:36px;height:36px;border:3px solid rgba(100,80,200,0.2);border-top-color:#cc44ff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:rgba(180,170,220,0.6)}.loading-step{font-size:11px;color:rgba(140,130,180,0.4);text-align:center}
.error-msg{display:none;padding:12px;background:rgba(200,50,50,0.15);border:1px solid rgba(200,50,50,0.3);border-radius:8px;color:#ff8888;font-size:12px;margin-top:10px}.error-msg.active{display:block}
#metadata{display:none;padding:10px 18px;background:rgba(30,25,55,0.4);border-top:1px solid rgba(100,80,200,0.1);font-size:11px;color:rgba(180,170,220,0.5)}
#metadata.active{display:flex;gap:16px;flex-wrap:wrap}
.meta-item span{color:#cc44ff;font-weight:600}
#viz{flex:1;position:relative;background:#0f1520}
#container3d{width:100%;height:100%;display:none;outline:none}
#scatter2d{width:100%;height:100%;display:none;overflow:hidden}
#forceGraph{width:100%;height:100%;display:none;overflow:hidden}
#empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5}
#empty-state.hidden{display:none}
.empty-icon{font-size:60px;opacity:0.15}.empty-title{font-size:18px;font-weight:700;color:rgba(180,170,220,0.3)}.empty-sub{font-size:13px;color:rgba(140,130,180,0.25);max-width:300px;text-align:center;line-height:1.5}
#toggle-panel{position:absolute;top:50%;left:0;transform:translateY(-50%);width:20px;height:50px;background:rgba(20,15,45,0.8);border:1px solid rgba(100,80,200,0.15);border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:15;color:rgba(180,170,220,0.5);font-size:12px}
#debug-view{display:none;position:absolute;inset:0;background:rgba(10,10,20,0.97);z-index:12;overflow:auto;padding:20px}
#debug-view.active{display:block}
#debug-view h3{color:#cc44ff;font-size:14px;margin-bottom:12px;font-weight:700}
.debug-section{margin-bottom:24px}
.debug-table{width:100%;border-collapse:collapse;font-size:11px;font-family:monospace}
.debug-table th{background:rgba(100,80,200,0.2);color:#e0dce8;padding:6px 8px;text-align:left;position:sticky;top:0;font-weight:600;white-space:nowrap}
.debug-table td{padding:5px 8px;border-bottom:1px solid rgba(100,80,200,0.08);color:rgba(200,195,220,0.8);white-space:nowrap}
.debug-table tr:hover td{background:rgba(100,80,200,0.06)}
.debug-table .num{text-align:right}.high{color:#ff8844;font-weight:600}.mid{color:#cc44ff}.low{color:rgba(140,130,180,0.5)}
/* D3 chart styles */
#scatter2d svg{background:rgb(229,236,246)}
#scatter2d .axis line,#scatter2d .axis path{stroke:rgba(0,0,0,0.1)}
#scatter2d .axis text{fill:#555;font-size:10px}
.chart-tooltip{position:absolute;padding:6px 10px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif;pointer-events:none;z-index:100}
#forceGraph svg{background:#0f1520}
#forceGraph .links line{stroke:#666;stroke-opacity:0.3}
#forceGraph .text{font-size:11px;fill:#ccc;font-family:'DM Sans',sans-serif}
#forceGraph .node{stroke:#fff;stroke-width:1.5}
#tooltip{position:absolute;padding:6px 10px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif;pointer-events:none;z-index:100}
</style>
</head>
<body>

<div id="header">
  <div class="logo"><div class="logo-icon">&#9670;</div><span class="logo-text">TopicScope</span><span class="logo-sub">Textual Data Visualization</span></div>
  <div class="header-right">
    <div class="switcher" id="mode-switcher" style="display:none">
      <button class="active" onclick="switchMode('2d')">2D Scatter</button>
      <button onclick="switchMode('3d')">3D Terrain</button>
      <button onclick="switchMode('fly')">Fly-Through</button>
      <button onclick="switchMode('force')">Force Graph</button>
      <button onclick="switchMode('debug')">Debug Table</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
</div>

<div id="main">
  <div id="input-panel">
    <div class="panel-header">
      <h2>Analyse Text</h2>
      <div class="tabs">
        <button class="active" onclick="switchTab('text')">Paste Text</button>
        <button onclick="switchTab('file')">Upload File</button>
      </div>
    </div>
    <div class="input-body" id="input-body">
      <div id="text-input" class="active"><textarea id="textarea" placeholder="Paste your article, report, or any text content here..."></textarea></div>
      <div id="file-input">
        <div class="dropzone" id="dropzone" onclick="document.getElementById('file-hidden').click()">
          <div class="dropzone-icon">&#128196;</div>
          <div class="dropzone-text">Drop a file here or click to browse</div>
          <div class="dropzone-sub">Supports .txt, .docx, .pdf</div>
        </div>
        <input type="file" id="file-hidden" accept=".txt,.docx,.pdf">
        <div id="file-name"></div>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">Analysing your text...</div><div class="loading-step" id="loading-step"></div></div>
    </div>
    <div class="analyse-section"><button id="analyse-btn" onclick="runAnalysis()">Analyse</button></div>
    <div id="metadata"><div class="meta-item"><span id="m-words">0</span> words</div><div class="meta-item"><span id="m-entities">0</span> entities</div><div class="meta-item"><span id="m-topics">0</span> topics</div><div class="meta-item"><span id="m-time">0</span>ms</div></div>
  </div>

  <div id="viz">
    <div id="empty-state"><div class="empty-icon">&#9968;</div><div class="empty-title">No analysis yet</div><div class="empty-sub">Paste text or upload a document to generate visualizations</div></div>
    <div id="scatter2d"></div>
    <div id="container3d" tabindex="0"></div>
    <div id="forceGraph"></div>
    <div id="debug-view"></div>
    <div id="toggle-panel" onclick="togglePanel()">&#9664;</div>
    <div class="chart-tooltip" id="scatterTooltip"></div>
    <div id="tooltip"></div>
  </div>
</div>

<!-- D3 v4 (for d3.event, schemeCategory20) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.13.0/d3.min.js"></script>
<!-- Lodash (for force-directed groupBy) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<!-- Three.js (for 3D terrain) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Fisheye plugin (from original) -->
<script>
(function(){d3.fisheye={scale:function(scaleType){return d3_fisheye_scale(scaleType(),3,0)},circular:function(){var radius=200,distortion=2,k0,k1,focus=[0,0];function fisheye(d){var dx=d.x-focus[0],dy=d.y-focus[1],dd=Math.sqrt(dx*dx+dy*dy);if(!dd||dd>=radius)return{x:d.x,y:d.y,z:1};var k=k0*(1-Math.exp(-dd*k1))/dd*.75+.25;return{x:focus[0]+dx*k,y:focus[1]+dy*k,z:Math.min(k,10)}}function rescale(){k0=Math.exp(distortion);k0=k0/(k0-1)*radius;k1=distortion/radius;return fisheye}fisheye.radius=function(_){if(!arguments.length)return radius;radius=+_;return rescale()};fisheye.distortion=function(_){if(!arguments.length)return distortion;distortion=+_;return rescale()};fisheye.focus=function(_){if(!arguments.length)return focus;focus=_;return fisheye};return rescale()}};function d3_fisheye_scale(scale,d,a){function fisheye(_){var x=scale(_),left=x<a,v,range=d3.extent(scale.range()),min=range[0],max=range[1],m=left?a-min:max-a;if(m==0)m=max-min;return(left?-1:1)*m*(d+1)/(d+(m/Math.abs(x-a)))+a}fisheye.distortion=function(_){if(!arguments.length)return d;d=+_;return fisheye};fisheye.focus=function(_){if(!arguments.length)return a;a=+_;return fisheye};fisheye.copy=function(){return d3_fisheye_scale(scale.copy(),d,a)};fisheye.nice=scale.nice;fisheye.ticks=scale.ticks;fisheye.tickFormat=scale.tickFormat;return d3.rebind(fisheye,scale,"domain","range")}})();
</script>

<script>
// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let TOPICS = [];          // normalized for terrain
let RAW_ENTITIES = [];    // API entities in D3-compatible format {entity,x,y,size,tag,cluster,salience}
let currentMode = '2d';
let animFrame = null;
let maxH = 0.28;
let lastData = null;
const API_BASE = window.location.origin;
const XYLIM = 0.4;
const V3_SIZE_RATIO = 0.40;
const V3_MAX_HEIGHT = 0.28;
const V3_MIN_HEIGHT = 0.035;

// ═══════════════════════════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════════════════════════
let selectedFile = null, currentTab = 'text';
function switchTab(t) { currentTab=t; document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('active',['text','file'][i]===t)); document.getElementById('text-input').classList.toggle('active',t==='text'); document.getElementById('file-input').classList.toggle('active',t==='file'); }
const dropzone=document.getElementById('dropzone'),fileInput=document.getElementById('file-hidden'),fileNameEl=document.getElementById('file-name');
dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('dragover')});
dropzone.addEventListener('dragleave',()=>dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});
function handleFile(f){const ext=f.name.split('.').pop().toLowerCase();if(!['txt','docx','pdf'].includes(ext)){showError('Use .txt, .docx, or .pdf');return}selectedFile=f;fileNameEl.textContent='\u{1F4C4} '+f.name;fileNameEl.style.display='block';hideError()}

// ═══════════════════════════════════════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════════════════════════════════════
async function runAnalysis(){
  const btn=document.getElementById('analyse-btn'),loading=document.getElementById('loading');hideError();
  if(currentTab==='text'){if(document.getElementById('textarea').value.trim().length<50){showError('Enter at least 50 characters.');return}}else{if(!selectedFile){showError('Select a file.');return}}
  btn.disabled=true;loading.classList.add('active');updateLoadingStep('Sending...');
  try{
    let response;
    if(currentTab==='text'){updateLoadingStep('Extracting entities...');response=await fetch(API_BASE+'/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:document.getElementById('textarea').value.trim()})})}
    else{const fd=new FormData();fd.append('file',selectedFile);updateLoadingStep('Parsing file...');response=await fetch(API_BASE+'/api/upload',{method:'POST',body:fd})}
    if(!response.ok){const err=await response.json().catch(()=>({detail:'Server error'}));throw new Error(err.detail||`Error ${response.status}`)}
    const data=await response.json();lastData=data;updateLoadingStep('Generating visualization...');await new Promise(r=>setTimeout(r,200));processResults(data);
  }catch(err){showError(err.message)}finally{btn.disabled=false;loading.classList.remove('active')}
}
function updateLoadingStep(m){document.getElementById('loading-step').textContent=m}
function showError(m){const e=document.getElementById('error-msg');e.textContent=m;e.classList.add('active')}
function hideError(){document.getElementById('error-msg').classList.remove('active')}
function togglePanel(){const p=document.getElementById('input-panel'),b=document.getElementById('toggle-panel');p.classList.toggle('collapsed');b.innerHTML=p.classList.contains('collapsed')?'&#9654;':'&#9664;';setTimeout(()=>renderCurrent(),50)}

// ═══════════════════════════════════════════════════════════════════════
// PROCESS RESULTS
// ═══════════════════════════════════════════════════════════════════════
function processResults(data) {
  const raw = data.topics;
  if (!raw.length) return;

  // ── Build D3-compatible entity list (for scatter + force) ─────
  // ALL entities are now top-level topics with their own x,y
  RAW_ENTITIES = raw.map(t => ({
    entity: t.label, x: t.x, y: t.y,
    size: t.size, tag: t.tag || 'MISC',
    cluster: t.cluster || 1, salience: t.salience || 0,
  }));

  // ── Build terrain topics — use SAME x,y as 2D scatter ──────────
  // Size and height normalized for terrain rendering
  const maxRawSize = Math.max(...raw.map(t=>t.size),0.001);
  const minRawSize = Math.min(...raw.map(t=>t.size),0.001);
  const maxRawH = Math.max(...raw.map(t=>t.height),0.01);
  // Compute data spread for size scaling
  const dataSpread = Math.max(...raw.map(t=>Math.abs(t.x)),...raw.map(t=>Math.abs(t.y)),0.5);

  TOPICS = raw.map(t => {
    // Position: RAW from API (same as D3 scatter uses)
    const sizeT = (maxRawSize>minRawSize)?(t.size-minRawSize)/(maxRawSize-minRawSize):0.5;
    // Size proportional to data spread (so footprints scale with the map)
    const nsize = dataSpread * (0.04 + sizeT * 0.15);
    const heightT = t.height / maxRawH;
    const nheight = V3_MIN_HEIGHT + heightT * (V3_MAX_HEIGHT - V3_MIN_HEIGHT);
    return {
      label: t.label, x: t.x, y: t.y,  // RAW positions — same as 2D
      size: nsize, height: nheight,
      wikipedia_url: t.wikipedia_url || '', source: t.source || '', similarity: t.similarity || 0,
      seed: Math.abs(Math.sin(t.x*127.1+t.y*311.7)*43758.5453) % 1000,
      tag: t.tag||'MISC', cluster: t.cluster||1,
    };
  });
  maxH = Math.max(...TOPICS.map(t=>t.height));

  // Metadata
  document.getElementById('m-words').textContent=data.metadata.word_count;
  document.getElementById('m-entities').textContent=data.metadata.entities_found;
  document.getElementById('m-topics').textContent=data.metadata.topics_final;
  document.getElementById('m-time').textContent=data.metadata.processing_time_ms;
  document.getElementById('metadata').classList.add('active');
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('mode-switcher').style.display='flex';
  currentMode='2d';
  document.querySelectorAll('#mode-switcher button').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('hint').textContent='Hover over entities';
  renderCurrent();
}

// ═══════════════════════════════════════════════════════════════════════
// 2D SCATTER — ported from original load_chart_2d.js
// ═══════════════════════════════════════════════════════════════════════
function render2DScatter() {
  const container = document.getElementById('scatter2d');
  container.innerHTML = '';
  const data = RAW_ENTITIES;
  if (!data.length) return;

  let alreadyExists = [];
  let distinctTags = [];
  data.forEach(item => {
    if (!alreadyExists.includes(item.tag)) {
      alreadyExists.push(item.tag);
      distinctTags.push({tag: item.tag, entity: item.entity});
    }
  });

  const colors = ["#f0f921","#e3685f","#a92495","#ff0000","#5802a3","#00bcd4","#4caf50","#ff9800"];
  const margin = {top:10, right:20, bottom:30, left:45};
  const rect = container.getBoundingClientRect();
  const width = rect.width - margin.left - margin.right;
  const height = rect.height - margin.top - margin.bottom;

  const yAxisRange = data.map(d => d.y);
  const xAxisRange = data.map(d => d.x);
  const sizeRange = data.map(d => d.size);
  const tagRange = data.map(d => d.tag);
  const colorScaleRegion = [...new Set(tagRange)];

  const maxSizeRange = d3.max(sizeRange);
  const yMin = d3.min(yAxisRange), yMax = d3.max(yAxisRange);
  const xMin = d3.min(xAxisRange), xMax = d3.max(xAxisRange);
  const circleRange = 40;

  const xScale = d3.scaleLinear().domain([xMin*1.2, xMax*1.4]).range([0, width]);
  const yScale = d3.scaleLinear().domain([yMin*1.2, yMax*1.4]).range([height, 0]);
  const radiusScale = d3.scaleSqrt().domain([0, maxSizeRange]).range([0, circleRange]);
  const colorScale = d3.scaleOrdinal(d3.schemeCategory10).domain(colorScaleRegion).range(colors);

  const xAxis = d3.axisBottom(xScale).tickFormat(x => x.toFixed(2)).tickSize(-height);
  const yAxis = d3.axisLeft(yScale).tickSize(-width);

  const svgZoom = d3.zoom().scaleExtent([0.5, 3]).on("zoom", function() {
    g.attr('transform', d3.event.transform);
  });

  const legendWidth = 140;
  const svg = d3.select("#scatter2d")
    .append("svg")
    .attr("width", width + margin.left + margin.right + legendWidth)
    .attr("height", height + margin.top + margin.bottom);

  const g = svg.append("g")
    .classed('graph', true)
    .call(svgZoom)
    .append("g")
    .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

  // Background
  g.append("rect").style("fill", "rgb(229,236,246)").attr("width", width).attr("height", height);

  // Axes
  g.append("g").attr("class","x axis").attr("transform","translate(0,"+height+")").call(xAxis);
  g.append("g").attr("class","y axis").call(yAxis);

  const tooltip = d3.select("#scatterTooltip");

  const outerCircle = g.append("g").attr("class","dots").selectAll(".dot").data(data).enter().append('g');

  // Circles (sorted so large behind small)
  outerCircle.append("circle")
    .attr("class","dot")
    .style("fill", d => colorScale(d.tag))
    .style("opacity", 0.8)
    .attr("cx", d => xScale(d.x))
    .attr("cy", d => yScale(d.y))
    .attr("r", d => radiusScale(d.size))
    .on("mousemove", function(d) {
      tooltip.transition().duration(200).style('opacity',0.9);
      tooltip.html(d.entity)
        .style('left',(d3.event.pageX+15)+'px')
        .style('top',(d3.event.pageY-10)+'px');
      tooltip.style('background-color', colorScale(d.tag)).style('color','#000');
    })
    .on("mouseout", () => tooltip.transition().duration(200).style('opacity',0))
    .sort((a,b) => b.size - a.size);

  // Labels above circles
  outerCircle.append('text')
    .attr('x', d => xScale(d.x))
    .attr('y', d => yScale(d.y) - radiusScale(d.size) - 6)
    .style('font-size', '12px')
    .attr('text-anchor', 'middle')
    .style('font-family', "'DM Sans',sans-serif")
    .style('fill', '#333')
    .sort((a,b) => b.size - a.size)
    .text(d => d.entity.length > 25 ? d.entity.substring(0,24)+'..' : d.entity);

  // Legend
  const legendSize = 14;
  const legend = svg.append("g").attr("class","legends")
    .attr("transform","translate("+(width+margin.left+20)+","+(margin.top+20)+")");

  legend.selectAll("rect").data(distinctTags).enter().append("rect")
    .attr("y",(d,i)=>i*(legendSize+5))
    .attr("width",legendSize).attr("height",legendSize)
    .style("fill",d=>colorScale(d.tag));

  legend.selectAll("text").data(distinctTags).enter().append("text")
    .attr("x",legendSize+5)
    .attr("y",(d,i)=>i*(legendSize+5)+legendSize/2+2)
    .style("fill",d=>colorScale(d.tag))
    .text(d=>d.tag)
    .style('font-size','11px')
    .style('font-family',"'DM Sans',sans-serif")
    .style("font-weight","600");
}

// ═══════════════════════════════════════════════════════════════════════
// FORCE-DIRECTED GRAPH — ported from original forced-directed.js + fisheye.js
// ═══════════════════════════════════════════════════════════════════════
function renderForceGraph() {
  const container = document.getElementById('forceGraph');
  container.innerHTML = '';
  const data = RAW_ENTITIES;
  if (!data.length) return;

  let groupData = _.chain(data).groupBy("cluster").value();
  const nodes = [];
  const links = [];
  let sourceCounter = 1, targetCounter = 1, changedGroupValue = 1, oldKey = "", id = 0;

  Object.keys(groupData).forEach(function(item, key) {
    let groupList = groupData[item];
    groupList.forEach(function(innerGroupItem) {
      id++;
      nodes.push({
        id: id,
        label: innerGroupItem.entity,
        group: innerGroupItem.cluster,
        size: innerGroupItem.size === 0 ? 0.1 : Math.max(0.5, Math.log(innerGroupItem.size * 100 + 1)),
      });
      if (oldKey !== "") {
        links.push({source: changedGroupValue, target: sourceCounter, value: 1});
        targetCounter = sourceCounter;
        oldKey = "";
      }
      links.push({source: sourceCounter, target: targetCounter, value: 1});
      sourceCounter++;
    });
    oldKey = key;
    changedGroupValue = targetCounter;
  });
  if (links.length) links.shift();

  const rect = container.getBoundingClientRect();
  const width = rect.width, height = rect.height;

  const colors = ["#857c85","#d27d7d","#c16548","#b960a7","#ddbd4d","#705177","#4ECDC4","#45B7D1"];
  var fisheye = d3.fisheye.circular().radius(200);
  const zoom = d3.zoom().scaleExtent([0.5,3]).on("zoom",function(){
    node.attr("transform",d3.event.transform);
    link.attr("transform",d3.event.transform);
    text.attr("transform",d3.event.transform);
  });

  const color = d3.scaleOrdinal(d3.schemeCategory20);
  const svg = d3.select("#forceGraph").append("svg").attr("width",width).attr("height",height);
  svg.call(zoom);

  const simulation = d3.forceSimulation()
    .force("link",d3.forceLink().id(d=>d.id).distance(15).strength(0.13))
    .force("charge",d3.forceManyBody().strength(-30))
    .force("center",d3.forceCenter(width/2,height/2));

  simulation.nodes(nodes).on("tick",ticked);
  simulation.force("link").links(links);

  const tooltip = d3.select("#tooltip");

  var link = svg.append("g").attr("class","links").selectAll("line")
    .data(links).enter().append("line")
    .attr("stroke-width",d=>Math.sqrt(d.value));

  const singlNodeGroup = svg.selectAll(".node-group").data(nodes).enter().append("g");

  var node = singlNodeGroup.append("circle")
    .classed("node",true)
    .attr("r",5)
    .attr("fill",d=>color(d.group))
    .call(d3.drag()
      .on("start",function(d){if(!d3.event.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
      .on("drag",function(d){d.fx=d3.event.x;d.fy=d3.event.y})
      .on("end",function(d){if(!d3.event.active)simulation.alphaTarget(0);d.fx=d.x;d.fy=d.y})
    )
    .on("mouseover",function(d){
      tooltip.transition().duration(200).style("opacity",0.9);
      tooltip.html(d.label).style("left",(d3.event.pageX+15)+"px").style("top",(d3.event.pageY-10)+"px");
      tooltip.style("background-color",color(d.group)).style("color","#000");
    })
    .on("mouseout",()=>tooltip.transition().duration(200).style("opacity",0));

  var text = singlNodeGroup.append("text")
    .attr("class","text")
    .text(d=>d.label.length>20?d.label.substring(0,19)+'..':d.label);

  function ticked(){
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("cx",d=>d.x).attr("cy",d=>d.y);
    text.attr("x",d=>d.x+10).attr("y",d=>d.y+5);
  }

  // Fisheye distortion on mousemove
  svg.on("mousemove",function(){
    fisheye.focus(d3.mouse(this));
    node.each(function(d){d.fisheye=fisheye(d)})
      .attr("cx",d=>d.fisheye.x).attr("cy",d=>d.fisheye.y)
      .attr("r",d=>d.fisheye.z*4.5);
    link.attr("x1",d=>d.source.fisheye.x).attr("y1",d=>d.source.fisheye.y)
      .attr("x2",d=>d.target.fisheye.x).attr("y2",d=>d.target.fisheye.y);
    singlNodeGroup.select("text").attr("x",d=>d.fisheye.x+10).attr("y",d=>d.fisheye.y+2);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// NOISE + TERRAIN (for 3D)
// ═══════════════════════════════════════════════════════════════════════
function hashNoise(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n)}
function smoothNoise(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);return(hashNoise(ix,iy)*(1-sx)+hashNoise(ix+1,iy)*sx)*(1-sy)+(hashNoise(ix,iy+1)*(1-sx)+hashNoise(ix+1,iy+1)*sx)*sy}
function fbm(x,y,o){let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=a*smoothNoise(x*f,y*f);a*=.5;f*=2}return v}
function organicRadiusNoise(angle,seed){return .3*Math.sin(angle*2+seed*1.17)+.2*Math.sin(angle*3+seed*2.31)+.15*Math.sin(angle*5+seed*3.79)+.1*Math.sin(angle*7+seed*5.13)}

function generateTerrain(gridN,xyLim){
  const grid=new Float32Array(gridN*gridN);
  const TAIL=0.5,TAIL_H=0.10,NS=0.12,CAP=0.9;
  for(let gi=0;gi<gridN;gi++)for(let gj=0;gj<gridN;gj++){
    const wx=(gi/gridN)*2*xyLim-xyLim,wy=(gj/gridN)*2*xyLim-xyLim;
    let tot=0;
    for(const t of TOPICS){
      const dx=wx-t.x,dy=wy-t.y,dist=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx);
      const eR=t.size*(1+organicRadiusNoise(ang,t.seed)*0.35);
      let c=0;
      if(dist<eR){const r=dist/eR;c=t.height*Math.sqrt(Math.max(0,1-r*r))}
      else{const te=eR*TAIL,ov=dist-eR;if(ov<te){const tt=ov/te;const tE=te*(1+organicRadiusNoise(ang*1.5+2,t.seed+50)*0.3);if(ov<=tE)c=t.height*TAIL_H*(1-tt)*(1-tt)}}
      if(c>tot)tot=c; // MAX accumulation (matches original graph.py)
    }
    if(tot>CAP)tot=CAP;
    if(tot>0.002)tot*=(1-NS*0.5+fbm(gi*0.06,gj*0.06,4)*NS);
    grid[gi*gridN+gj]=tot;
  }
  for(let p=0;p<2;p++){const tmp=new Float32Array(gridN*gridN);for(let i=1;i<gridN-1;i++)for(let j=1;j<gridN-1;j++){const idx=i*gridN+j;tmp[idx]=grid[idx]*.4+grid[(i-1)*gridN+j]*.1+grid[(i+1)*gridN+j]*.1+grid[i*gridN+j-1]*.1+grid[i*gridN+j+1]*.1+grid[(i-1)*gridN+j-1]*.05+grid[(i+1)*gridN+j+1]*.05+grid[(i-1)*gridN+j+1]*.05+grid[(i+1)*gridN+j-1]*.05}for(let k=0;k<grid.length;k++)if(tmp[k]>0)grid[k]=tmp[k]}
  return grid;
}

function heightToColor(h){const t=h/maxH;if(t>.85)return{r:.92,g:.87,b:.8};if(t>.65)return{r:.72,g:.62,b:.48};if(t>.45)return{r:.58,g:.65,b:.38};if(t>.25)return{r:.42,g:.58,b:.35};if(t>.1)return{r:.35,g:.5,b:.32};if(t>.02)return{r:.28,g:.42,b:.28};return{r:.12,g:.18,b:.28}}

function init3D(){
  const c=document.getElementById('container3d'),W=c.clientWidth,H=c.clientHeight;
  const scene=new THREE.Scene();scene.background=new THREE.Color(0x8aaabe);scene.fog=new THREE.FogExp2(0x8aaabe,0.025);
  const camera=new THREE.PerspectiveCamera(50,W/H,0.1,1000);camera.position.set(0,12,22);camera.lookAt(0,0,0);
  const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));c.appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0x99aabb,0.6));
  const sun=new THREE.DirectionalLight(0xfff4e0,1);sun.position.set(8,15,5);scene.add(sun);
  const fill=new THREE.DirectionalLight(0x88aacc,0.3);fill.position.set(-5,8,-8);scene.add(fill);

  // Compute xyLim from actual data range (matches 2D scatter extent)
  const dataXYLim = Math.max(...TOPICS.map(t=>Math.abs(t.x)),...TOPICS.map(t=>Math.abs(t.y)),0.5) * 1.3;
  const gridN=200, xyLim=dataXYLim, heightScale=22;
  const planeSize = 28;

  const td=generateTerrain(gridN,xyLim);
  const geo=new THREE.PlaneGeometry(planeSize,planeSize,gridN-1,gridN-1);geo.rotateX(-Math.PI/2);
  const verts=geo.attributes.position,colors=new Float32Array(verts.count*3);
  for(let i=0;i<verts.count;i++){const ix=i%gridN,iy=Math.floor(i/gridN);const h=td[iy*gridN+ix];verts.setY(i,h*heightScale);const co=heightToColor(h);colors[i*3]=co.r;colors[i*3+1]=co.g;colors[i*3+2]=co.b}
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));geo.computeVertexNormals();
  scene.add(new THREE.Mesh(geo,new THREE.MeshPhongMaterial({vertexColors:true,shininess:15,specular:0x222222,side:THREE.DoubleSide,flatShading:false})));
  // Ocean
  const seaGeo=new THREE.PlaneGeometry(80,80);seaGeo.rotateX(-Math.PI/2);
  const sea=new THREE.Mesh(seaGeo,new THREE.MeshPhongMaterial({color:0x3a5a7a,shininess:60,specular:0x446688,transparent:true,opacity:0.85}));
  sea.position.y=-0.1;scene.add(sea);
  // Labels — position using same mapping as terrain grid
  const halfPlane = planeSize / 2;
  for(const t of TOPICS){
    if(t.height<V3_MIN_HEIGHT+0.01)continue;
    const cv=document.createElement('canvas'),cx=cv.getContext('2d');cv.width=512;cv.height=72;cx.clearRect(0,0,512,72);
    const fs=t.height>0.2?26:t.height>0.1?21:16;
    cx.font=`bold ${fs}px 'DM Sans',sans-serif`;
    const tm=cx.measureText(t.label),bw=Math.min(500,tm.width+20),bx=256-bw/2;
    cx.fillStyle='rgba(255,255,245,0.75)';cx.beginPath();cx.roundRect(bx,10,bw,fs+14,6);cx.fill();
    cx.fillStyle='#2a2a20';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(t.label,256,10+(fs+14)/2);
    const tex=new THREE.CanvasTexture(cv);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
    // Map raw x,y to Three.js world coords (same mapping as terrain grid)
    const sx=(t.x/xyLim)*halfPlane, sz=-(t.y/xyLim)*halfPlane;
    sp.position.set(sx,t.height*heightScale+2,sz);sp.scale.set(7,1,1);scene.add(sp);
  }
  return{scene,camera,renderer};
}

// ═══════════════════════════════════════════════════════════════════════
// 3D CONTROLS
// ═══════════════════════════════════════════════════════════════════════
let orbit={drag:false,lx:0,ly:0,theta:.3,phi:.9,dist:22};
function updateOrbit(cam){cam.position.x=orbit.dist*Math.sin(orbit.phi)*Math.sin(orbit.theta);cam.position.y=orbit.dist*Math.cos(orbit.phi);cam.position.z=orbit.dist*Math.sin(orbit.phi)*Math.cos(orbit.theta);cam.lookAt(0,0,0)}
function attachOrbit(cam,el){updateOrbit(cam);el.addEventListener('mousedown',e=>{orbit.drag=true;orbit.lx=e.clientX;orbit.ly=e.clientY});el.addEventListener('mouseup',()=>orbit.drag=false);el.addEventListener('mouseleave',()=>orbit.drag=false);el.addEventListener('mousemove',e=>{if(!orbit.drag||currentMode!=='3d')return;orbit.theta+=(e.clientX-orbit.lx)*.005;orbit.phi=Math.max(.1,Math.min(Math.PI*.48,orbit.phi-(e.clientY-orbit.ly)*.005));orbit.lx=e.clientX;orbit.ly=e.clientY;updateOrbit(cam)});el.addEventListener('wheel',e=>{if(currentMode!=='3d')return;orbit.dist=Math.max(5,Math.min(50,orbit.dist+e.deltaY*.015));updateOrbit(cam);e.preventDefault()},{passive:false})}
const flyK={},flyM={drag:false,x:0,y:0};
function attachFly(cam,el){window.addEventListener('keydown',e=>{flyK[e.key.toLowerCase()]=true});window.addEventListener('keyup',e=>{flyK[e.key.toLowerCase()]=false});el.addEventListener('mousedown',e=>{flyM.drag=true;flyM.x=e.clientX;flyM.y=e.clientY});el.addEventListener('mouseup',()=>flyM.drag=false);el.addEventListener('mouseleave',()=>flyM.drag=false);el.addEventListener('mousemove',e=>{if(!flyM.drag||currentMode!=='fly')return;cam.rotation.order='YXZ';cam.rotation.y-=(e.clientX-flyM.x)*.003;cam.rotation.x=Math.max(-Math.PI/3,Math.min(Math.PI/3,cam.rotation.x-(e.clientY-flyM.y)*.003));flyM.x=e.clientX;flyM.y=e.clientY})}
function tickFly(cam){if(currentMode!=='fly')return;const s=.14,d=new THREE.Vector3;cam.getWorldDirection(d);const r=new THREE.Vector3().crossVectors(d,cam.up).normalize();if(flyK.w||flyK.arrowup)cam.position.addScaledVector(d,s);if(flyK.s||flyK.arrowdown)cam.position.addScaledVector(d,-s);if(flyK.a||flyK.arrowleft)cam.position.addScaledVector(r,-s);if(flyK.d||flyK.arrowright)cam.position.addScaledVector(r,s);if(flyK.q)cam.position.y+=s*.6;if(flyK.e)cam.position.y-=s*.6}

// ═══════════════════════════════════════════════════════════════════════
// DEBUG TABLE
// ═══════════════════════════════════════════════════════════════════════
function renderDebugTable(){
  if(!lastData)return;const dv=document.getElementById('debug-view');let html='';
  html+='<div class="debug-section"><h3>Named Entities ('+lastData.entities.length+')</h3><table class="debug-table"><tr><th>#</th><th>Entity</th><th>Type</th><th>Confidence</th></tr>';
  lastData.entities.forEach((e,i)=>{html+='<tr><td class="num">'+(i+1)+'</td><td>'+e.name+'</td><td>'+e.type+'</td><td class="num '+(e.confidence>0.5?'high':'mid')+'">'+e.confidence.toFixed(3)+'</td></tr>'});
  html+='</table></div>';
  if(lastData.debug&&lastData.debug.length){
    html+='<div class="debug-section"><h3>Pipeline Debug ('+lastData.debug.length+')</h3><table class="debug-table"><tr><th>#</th><th>Topic</th><th>Source</th><th>Tag</th><th>Cluster</th><th>Salience</th><th>Size</th><th>TF-IDF Sim</th><th>Height</th><th>X</th><th>Y</th></tr>';
    lastData.debug.forEach((d,i)=>{html+='<tr><td class="num">'+(i+1)+'</td><td>'+d.title+'</td><td>'+d.source+'</td><td>'+(d.tag||'')+'</td><td class="num">'+(d.cluster||'')+'</td><td class="num">'+(d.salience||0).toFixed(4)+'</td><td class="num">'+(d.size||0).toFixed(4)+'</td><td class="num">'+(d.tfidf_sim||0).toFixed(4)+'</td><td class="num">'+(d.height||0).toFixed(4)+'</td><td class="num">'+(d.x_final||d.x||0)+'</td><td class="num">'+(d.y_final||d.y||0)+'</td></tr>'});
    html+='</table></div>';
  }
  html+='<div class="debug-section"><h3>D3 Entities ('+RAW_ENTITIES.length+' total)</h3><table class="debug-table"><tr><th>#</th><th>Entity</th><th>Tag</th><th>Cluster</th><th>Size</th><th>X</th><th>Y</th></tr>';
  RAW_ENTITIES.forEach((e,i)=>{html+='<tr><td class="num">'+(i+1)+'</td><td>'+e.entity+'</td><td>'+e.tag+'</td><td class="num">'+e.cluster+'</td><td class="num">'+e.size.toFixed(4)+'</td><td class="num">'+e.x.toFixed(4)+'</td><td class="num">'+e.y.toFixed(4)+'</td></tr>'});
  html+='</table></div>';
  dv.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════════════════════════════════════════════
const hints={'2d':'Hover over entities · Scroll to zoom','3d':'Drag to orbit · Scroll to zoom','fly':'WASD move · Mouse look · Q/E altitude','force':'Drag nodes · Fisheye on hover','debug':'Pipeline debug data'};
function switchMode(mode){
  currentMode=mode;
  document.getElementById('hint').textContent=hints[mode]||'';
  document.querySelectorAll('#mode-switcher button').forEach((b,i)=>b.classList.toggle('active',['2d','3d','fly','force','debug'][i]===mode));
  renderCurrent();
}

function renderCurrent(){
  if(!TOPICS.length&&!RAW_ENTITIES.length)return;
  const views=['scatter2d','container3d','forceGraph'];
  views.forEach(id=>{document.getElementById(id).style.display='none'});
  document.getElementById('debug-view').classList.remove('active');
  if(animFrame)cancelAnimationFrame(animFrame);

  if(currentMode==='debug'){document.getElementById('debug-view').classList.add('active');renderDebugTable();return}
  if(currentMode==='2d'){document.getElementById('scatter2d').style.display='block';render2DScatter();return}
  if(currentMode==='force'){document.getElementById('forceGraph').style.display='block';renderForceGraph();return}

  // 3D or fly
  const c3=document.getElementById('container3d');c3.style.display='block';c3.innerHTML='';
  const{scene,camera,renderer}=init3D();attachOrbit(camera,renderer.domElement);attachFly(camera,renderer.domElement);
  if(currentMode==='3d'){orbit={drag:false,lx:0,ly:0,theta:.3,phi:.9,dist:22};updateOrbit(camera)}
  else{camera.position.set(-12,6,18);camera.rotation.order='YXZ';camera.lookAt(0,3,0)}
  c3.focus();
  function anim(){animFrame=requestAnimationFrame(anim);tickFly(camera);renderer.render(scene,camera)}anim();
  window.onresize=()=>{camera.aspect=c3.clientWidth/c3.clientHeight;camera.updateProjectionMatrix();renderer.setSize(c3.clientWidth,c3.clientHeight)};
}
</script>
