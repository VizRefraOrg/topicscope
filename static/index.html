<!-- Fisheye plugin (from original) -->
<script>
(function(){d3.fisheye={scale:function(scaleType){return d3_fisheye_scale(scaleType(),3,0)},circular:function(){var radius=200,distortion=2,k0,k1,focus=[0,0];function fisheye(d){var dx=d.x-focus[0],dy=d.y-focus[1],dd=Math.sqrt(dx*dx+dy*dy);if(!dd||dd>=radius)return{x:d.x,y:d.y,z:1};var k=k0*(1-Math.exp(-dd*k1))/dd*.75+.25;return{x:focus[0]+dx*k,y:focus[1]+dy*k,z:Math.min(k,10)}}function rescale(){k0=Math.exp(distortion);k0=k0/(k0-1)*radius;k1=distortion/radius;return fisheye}fisheye.radius=function(_){if(!arguments.length)return radius;radius=+_;return rescale()};fisheye.distortion=function(_){if(!arguments.length)return distortion;distortion=+_;return rescale()};fisheye.focus=function(_){if(!arguments.length)return focus;focus=_;return fisheye};return rescale()}};function d3_fisheye_scale(scale,d,a){function fisheye(_){var x=scale(_),left=x<a,v,range=d3.extent(scale.range()),min=range[0],max=range[1],m=left?a-min:max-a;if(m==0)m=max-min;return(left?-1:1)*m*(d+1)/(d+(m/Math.abs(x-a)))+a}fisheye.distortion=function(_){if(!arguments.length)return d;d=+_;return fisheye};fisheye.focus=function(_){if(!arguments.length)return a;a=+_;return fisheye};fisheye.copy=function(){return d3_fisheye_scale(scale.copy(),d,a)};fisheye.nice=scale.nice;fisheye.ticks=scale.ticks;fisheye.tickFormat=scale.tickFormat;return d3.rebind(fisheye,scale,"domain","range")}})();
</script>

<script>
// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let TOPICS = [];          // normalized for terrain
let RAW_ENTITIES = [];    // API entities in D3-compatible format {entity,x,y,size,tag,cluster,salience}
let HEIGHTMAP = null;
let ALL_ENTITY_POSITIONS = [];
let currentMode = '2d';
let animFrame = null;
let maxH = 0.28;
let lastData = null;
const API_BASE = window.location.origin;
const XYLIM = 0.4;
const V3_SIZE_RATIO = 0.40;
const V3_MAX_HEIGHT = 0.28;
const V3_MIN_HEIGHT = 0.035;

// ═══════════════════════════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════════════════════════
let selectedFile = null, currentTab = 'text';
function switchTab(t) { currentTab=t; document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('active',['text','file'][i]===t)); document.getElementById('text-input').classList.toggle('active',t==='text'); document.getElementById('file-input').classList.toggle('active',t==='file'); }
const dropzone=document.getElementById('dropzone'),fileInput=document.getElementById('file-hidden'),fileNameEl=document.getElementById('file-name');
dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('dragover')});
dropzone.addEventListener('dragleave',()=>dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0])});
function handleFile(f){const ext=f.name.split('.').pop().toLowerCase();if(!['txt','docx','pdf'].includes(ext)){showError('Use .txt, .docx, or .pdf');return}selectedFile=f;fileNameEl.textContent='\u{1F4C4} '+f.name;fileNameEl.style.display='block';hideError()}

// ═══════════════════════════════════════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════════════════════════════════════
async function runAnalysis(){
  const btn=document.getElementById('analyse-btn'),loading=document.getElementById('loading');hideError();
  if(currentTab==='text'){if(document.getElementById('textarea').value.trim().length<50){showError('Enter at least 50 characters.');return}}else{if(!selectedFile){showError('Select a file.');return}}
  btn.disabled=true;loading.classList.add('active');updateLoadingStep('Sending...');
  try{
    let response;
    if(currentTab==='text'){updateLoadingStep('Extracting entities...');response=await fetch(API_BASE+'/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:document.getElementById('textarea').value.trim()})})}
    else{const fd=new FormData();fd.append('file',selectedFile);updateLoadingStep('Parsing file...');response=await fetch(API_BASE+'/api/upload',{method:'POST',body:fd})}
    if(!response.ok){const err=await response.json().catch(()=>({detail:'Server error'}));throw new Error(err.detail||`Error ${response.status}`)}
    const data=await response.json();lastData=data;updateLoadingStep('Generating visualization...');await new Promise(r=>setTimeout(r,200));processResults(data);
  }catch(err){showError(err.message)}finally{btn.disabled=false;loading.classList.remove('active')}
}
function updateLoadingStep(m){document.getElementById('loading-step').textContent=m}
function showError(m){const e=document.getElementById('error-msg');e.textContent=m;e.classList.add('active')}
function hideError(){document.getElementById('error-msg').classList.remove('active')}
function togglePanel(){const p=document.getElementById('input-panel'),b=document.getElementById('toggle-panel');p.classList.toggle('collapsed');b.innerHTML=p.classList.contains('collapsed')?'&#9654;':'&#9664;';setTimeout(()=>renderCurrent(),50)}

// ═══════════════════════════════════════════════════════════════════════
// PROCESS RESULTS
// ═══════════════════════════════════════════════════════════════════════
function processResults(data) {
  const raw = data.topics;
  if (!raw.length) return;

  // ── Build D3-compatible entity list (for scatter + force) ─────
  // ALL entities are now top-level topics with their own x,y
  RAW_ENTITIES = raw.map(t => ({
    entity: t.label, x: t.x, y: t.y,
    size: t.size, tag: t.tag || 'MISC',
    cluster: t.cluster || 1, salience: t.salience || 0,
  }));

  // ── Build terrain topics — use SAME x,y as 2D scatter ──────────
  // Size and height normalized for terrain rendering
  const maxRawSize = Math.max(...raw.map(t=>t.size),0.001);
  const minRawSize = Math.min(...raw.map(t=>t.size),0.001);
  const maxRawH = Math.max(...raw.map(t=>t.height),0.01);
  // Compute data spread for size scaling
  const dataSpread = Math.max(...raw.map(t=>Math.abs(t.x)),...raw.map(t=>Math.abs(t.y)),0.5);

  TOPICS = raw.map(t => {
    // Position: RAW from API (same as D3 scatter uses)
    const sizeT = (maxRawSize>minRawSize)?(t.size-minRawSize)/(maxRawSize-minRawSize):0.5;
    // Size proportional to data spread (so footprints scale with the map)
    const nsize = dataSpread * (0.04 + sizeT * 0.15);
    const heightT = t.height / maxRawH;
    const nheight = V3_MIN_HEIGHT + heightT * (V3_MAX_HEIGHT - V3_MIN_HEIGHT);
    return {
      label: t.label, x: t.x, y: t.y,  // RAW positions — same as 2D
      size: nsize, height: nheight,
      wikipedia_url: t.wikipedia_url || '', source: t.source || '', similarity: t.similarity || 0,
      seed: Math.abs(Math.sin(t.x*127.1+t.y*311.7)*43758.5453) % 1000,
      tag: t.tag||'MISC', cluster: t.cluster||1,
      // Grid position embedded per-topic (survives sorting in backend)
      gridPos: (t.grid_gx >= 0 && t.grid_gy >= 0) ? {gx: t.grid_gx, gy: t.grid_gy} : null,
    };
  });
  maxH = Math.max(...TOPICS.map(t=>t.height));

  // Store server-computed heightmap
  HEIGHTMAP = data.heightmap || null;

  // Store all entity positions (includes non-topic NER entities for 3D labels)
  ALL_ENTITY_POSITIONS = data.all_entity_positions || [];

  // Metadata
  document.getElementById('m-words').textContent=data.metadata.word_count;
  document.getElementById('m-entities').textContent=data.metadata.entities_found;
  document.getElementById('m-topics').textContent=data.metadata.topics_final;
  document.getElementById('m-time').textContent=data.metadata.processing_time_ms;
  document.getElementById('metadata').classList.add('active');
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('mode-switcher').style.display='flex';
  currentMode='2d';
  document.querySelectorAll('#mode-switcher button').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('hint').textContent='Hover over entities';
  renderCurrent();
}

// ═══════════════════════════════════════════════════════════════════════
// 2D SCATTER — ported from original load_chart_2d.js
// ═══════════════════════════════════════════════════════════════════════
function render2DScatter() {
  const container = document.getElementById('scatter2d');
  container.innerHTML = '';
  const data = RAW_ENTITIES;
  if (!data.length) return;

  const margin = {top: 10, right: 160, bottom: 30, left: 45};
  const rect = container.getBoundingClientRect();
  const width = rect.width - margin.left - margin.right;
  const height = rect.height - margin.top - margin.bottom;

  // Scales
  const xExtent = d3.extent(data, d => d.x);
  const yExtent = d3.extent(data, d => d.y);
  const xPad = (xExtent[1] - xExtent[0]) * 0.15 || 1;
  const yPad = (yExtent[1] - yExtent[0]) * 0.15 || 1;

  const xScale = d3.scaleLinear()
      .domain([xExtent[0] - xPad, xExtent[1] + xPad])
      .range([0, width]);
  const yScale = d3.scaleLinear()
      .domain([yExtent[0] - yPad, yExtent[1] + yPad])
      .range([height, 0]);

  const maxSize = d3.max(data, d => d.size) || 1;
  const radiusScale = d3.scaleSqrt().domain([0, maxSize]).range([4, 35]);

  // Color by cluster
  const clusterIds = [...new Set(data.map(d => d.cluster))].sort((a,b) => a - b);
  const clusterPalette = ['#4E79A7','#F28E2B','#E15759','#76B7B2','#59A14F','#EDC948','#B07AA1','#FF9DA7'];
  const colorScale = d3.scaleOrdinal().domain(clusterIds).range(clusterPalette);

  const xAxis = d3.axisBottom(xScale).tickFormat(x => x.toFixed(2)).tickSize(-height);
  const yAxis = d3.axisLeft(yScale).tickSize(-width);

  const svgZoom = d3.zoom().scaleExtent([0.5, 5]).on("zoom", function() {
    g.attr('transform', d3.event.transform);
  });

  const svg = d3.select("#scatter2d")
    .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom);

  const g = svg.append("g")
    .classed('graph', true)
    .call(svgZoom)
    .append("g")
    .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

  // Background
  g.append("rect").style("fill", "#F8F9FA").attr("width", width).attr("height", height);

  // Axes
  g.append("g").attr("class","x axis").attr("transform","translate(0," + height + ")").call(xAxis);
  g.append("g").attr("class","y axis").call(yAxis);

  // Contour density overlay
  if (typeof d3.contourDensity === 'function' && data.length >= 5) {
    var contourData = d3.contourDensity()
        .x(function(d) { return xScale(d.x); })
        .y(function(d) { return yScale(d.y); })
        .weight(function(d) { return d.salience || 0.1; })
        .size([width, height])
        .bandwidth(30)
        .thresholds(12)
        (data);

    var contourMax = d3.max(contourData, function(d) { return d.value; }) || 1;
    g.append("g").attr("class", "contours")
        .selectAll("path")
        .data(contourData)
        .enter().append("path")
        .attr("d", d3.geoPath())
        .attr("fill", function(d) {
            var t = d.value / contourMax;
            var r = Math.round(100 - t * 60);
            var gv = Math.round(180 - t * 40);
            var b = Math.round(100 - t * 60);
            return 'rgb(' + r + ',' + gv + ',' + b + ')';
        })
        .attr("stroke", "#5A8A5A")
        .attr("stroke-width", 0.5)
        .attr("stroke-opacity", 0.3)
        .attr("fill-opacity", 0.35);
  }

  const tooltip = d3.select("#scatterTooltip");

  // Sort data so large circles render behind small ones
  data.sort(function(a, b) { return b.size - a.size; });

  const outerCircle = g.append("g").attr("class","dots").selectAll(".dot").data(data).enter().append('g');

  // Entity circles on top of contours
  outerCircle.append("circle")
    .attr("class","dot")
    .style("fill", function(d) { return colorScale(d.cluster); })
    .style("fill-opacity", 0.75)
    .attr("cx", function(d) { return xScale(d.x); })
    .attr("cy", function(d) { return yScale(d.y); })
    .attr("r", function(d) { return radiusScale(d.size); })
    .style("stroke", function(d) { return d3.color(colorScale(d.cluster)).darker(0.7); })
    .style("stroke-width", 1.5)
    .on("mousemove", function(d) {
      tooltip.transition().duration(200).style('opacity', 0.9);
      tooltip.html('<strong>' + d.entity + '</strong><br>Cluster: ' + d.cluster + '<br>Salience: ' + (d.salience || 0).toFixed(3))
        .style('left', (d3.event.pageX + 15) + 'px')
        .style('top', (d3.event.pageY - 10) + 'px')
        .style('background-color', '#fff')
        .style('color', '#333')
        .style('border', '1px solid ' + colorScale(d.cluster))
        .style('padding', '8px 12px')
        .style('border-radius', '6px')
        .style('box-shadow', '0 2px 8px rgba(0,0,0,0.15)');
    })
    .on("mouseout", function() { tooltip.transition().duration(200).style('opacity', 0); });

  // Labels above circles
  outerCircle.append('text')
    .attr('x', function(d) { return xScale(d.x); })
    .attr('y', function(d) { return yScale(d.y) - radiusScale(d.size) - 5; })
    .style('font-size', '11px')
    .attr('text-anchor', 'middle')
    .style('font-family', "'DM Sans',sans-serif")
    .style('fill', '#333')
    .text(function(d) { return d.entity.length > 28 ? d.entity.substring(0, 27) + '..' : d.entity; });

  // Cluster legend
  const legend = svg.append("g").attr("transform", "translate(" + (width + margin.left + 15) + "," + (margin.top + 10) + ")");
  legend.append("text").text("Clusters").style("font-size","12px").style("font-weight","700").style("fill","#333");
  clusterIds.forEach(function(id, i) {
    var lg = legend.append("g").attr("transform", "translate(0," + (20 + i * 22) + ")");
    lg.append("rect").attr("width",14).attr("height",14).attr("rx",3).style("fill", colorScale(id));
    lg.append("text").attr("x",20).attr("y",11).text("Group " + id).style("font-size","11px").style("fill","#555");
  });
}

// ═══════════════════════════════════════════════════════════════════════
// FORCE-DIRECTED GRAPH — ported from original forced-directed.js + fisheye.js
// ═══════════════════════════════════════════════════════════════════════
function renderForceGraph() {
  const container = document.getElementById('forceGraph');
  container.innerHTML = '';
  const data = RAW_ENTITIES;
  if (!data.length) return;

  let groupData = _.chain(data).groupBy("cluster").value();
  const nodes = [];
  const links = [];
  let sourceCounter = 1, targetCounter = 1, changedGroupValue = 1, oldKey = "", id = 0;

  Object.keys(groupData).forEach(function(item, key) {
    let groupList = groupData[item];
    groupList.forEach(function(innerGroupItem) {
      id++;
      nodes.push({
        id: id,
        label: innerGroupItem.entity,
        group: innerGroupItem.cluster,
        size: innerGroupItem.size === 0 ? 0.1 : Math.max(0.5, Math.log(innerGroupItem.size * 100 + 1)),
      });
      if (oldKey !== "") {
        links.push({source: changedGroupValue, target: sourceCounter, value: 1});
        targetCounter = sourceCounter;
        oldKey = "";
      }
      links.push({source: sourceCounter, target: targetCounter, value: 1});
      sourceCounter++;
    });
    oldKey = key;
    changedGroupValue = targetCounter;
  });
  if (links.length) links.shift();

  const rect = container.getBoundingClientRect();
  const width = rect.width, height = rect.height;

  // Spread nodes in a circle before simulation starts
  const N = nodes.length;
  const spreadRadius = Math.min(width, height) * 0.35;
  nodes.forEach(function(d, i) {
    const angle = (i / N) * 2 * Math.PI;
    d.x = width / 2 + spreadRadius * Math.cos(angle);
    d.y = height / 2 + spreadRadius * Math.sin(angle);
  });

  const nodeRadius = d3.scaleSqrt()
    .domain([0, d3.max(nodes, d => d.size)])
    .range([4, 18]);

  const clusterPalette = ['#4E79A7','#F28E2B','#E15759','#76B7B2','#59A14F','#EDC948','#B07AA1','#FF9DA7'];
  const color = d3.scaleOrdinal().domain([...new Set(nodes.map(d => d.group))].sort((a,b)=>a-b)).range(clusterPalette);

  var fisheye = d3.fisheye.circular().radius(200);
  const zoom = d3.zoom().scaleExtent([0.5,3]).on("zoom",function(){
    node.attr("transform",d3.event.transform);
    link.attr("transform",d3.event.transform);
    text.attr("transform",d3.event.transform);
  });

  const svg = d3.select("#forceGraph").append("svg").attr("width",width).attr("height",height);
  svg.call(zoom);

  const simulation = d3.forceSimulation()
    .force("link",d3.forceLink().id(d=>d.id).distance(25).strength(0.15))
    .force("charge",d3.forceManyBody().strength(-80))
    .force("center",d3.forceCenter(width/2,height/2))
    .force("collision",d3.forceCollide().radius(d => nodeRadius(d.size) + 2));

  simulation.nodes(nodes).on("tick",ticked);
  simulation.force("link").links(links);

  const tooltip = d3.select("#tooltip");

  var link = svg.append("g").attr("class","links").selectAll("line")
    .data(links).enter().append("line")
    .attr("stroke","#999").attr("stroke-opacity",0.25)
    .attr("stroke-width",d=>Math.sqrt(d.value));

  const singlNodeGroup = svg.selectAll(".node-group").data(nodes).enter().append("g");

  var node = singlNodeGroup.append("circle")
    .classed("node",true)
    .attr("r",d => nodeRadius(d.size))
    .attr("fill",d=>color(d.group))
    .attr("stroke","#fff")
    .attr("stroke-width",1.5)
    .call(d3.drag()
      .on("start",function(d){if(!d3.event.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
      .on("drag",function(d){d.fx=d3.event.x;d.fy=d3.event.y})
      .on("end",function(d){if(!d3.event.active)simulation.alphaTarget(0);d.fx=d.x;d.fy=d.y})
    )
    .on("mouseover",function(d){
      tooltip.transition().duration(200).style("opacity",0.9);
      tooltip.html('<strong>' + d.label + '</strong><br>Cluster: ' + d.group + '<br>Size: ' + d.size.toFixed(2))
        .style("left",(d3.event.pageX+15)+"px").style("top",(d3.event.pageY-10)+"px")
        .style("background-color","#fff")
        .style("color","#333")
        .style("border","1px solid " + color(d.group))
        .style("padding","8px 12px")
        .style("border-radius","6px")
        .style("box-shadow","0 2px 8px rgba(0,0,0,0.15)");
    })
    .on("mouseout",()=>tooltip.transition().duration(200).style("opacity",0));

  var text = singlNodeGroup.append("text")
    .attr("class","text")
    .text(d=>d.label.length>20?d.label.substring(0,19)+'..':d.label)
    .style("display", d => d.size > 1.5 ? "block" : "none")
    .style("font-size","10px")
    .style("fill","#333");

  function ticked(){
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("cx",d=>d.x).attr("cy",d=>d.y);
    text.attr("x",d=>d.x+10).attr("y",d=>d.y+5);
  }

  // Fisheye distortion on mousemove
  svg.on("mousemove",function(){
    fisheye.focus(d3.mouse(this));
    node.each(function(d){d.fisheye=fisheye(d)})
      .attr("cx",d=>d.fisheye.x).attr("cy",d=>d.fisheye.y)
      .attr("r",d=>d.fisheye.z * nodeRadius(d.size) * 0.8 + nodeRadius(d.size) * 0.2);
    link.attr("x1",d=>d.source.fisheye.x).attr("y1",d=>d.source.fisheye.y)
      .attr("x2",d=>d.target.fisheye.x).attr("y2",d=>d.target.fisheye.y);
    singlNodeGroup.select("text").attr("x",d=>d.fisheye.x+10).attr("y",d=>d.fisheye.y+2);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// 3D TERRAIN — Three.js with paraboloid profile (1-r²) from graph.py
// No organic noise, no half-ellipse, clean mathematical surface
// ═══════════════════════════════════════════════════════════════════════
function terrainColorSmooth(h) {
    // Green → olive → tan/brown → white (matching ideal 3D scape reference)
    const stops = [
        { t: 0.00, r: 0.28, g: 0.52, b: 0.22 },  // dark green (shore)
        { t: 0.15, r: 0.35, g: 0.58, b: 0.25 },  // medium green (lowland)
        { t: 0.30, r: 0.45, g: 0.56, b: 0.28 },  // olive green (foothills)
        { t: 0.45, r: 0.58, g: 0.55, b: 0.32 },  // olive-tan
        { t: 0.60, r: 0.70, g: 0.58, b: 0.38 },  // tan (highland)
        { t: 0.75, r: 0.80, g: 0.68, b: 0.50 },  // light brown
        { t: 0.88, r: 0.90, g: 0.82, b: 0.68 },  // sandy
        { t: 1.00, r: 0.97, g: 0.95, b: 0.90 },  // white/cream summit
    ];
    h = Math.max(0, Math.min(1, h));
    for (let i = 0; i < stops.length - 1; i++) {
        if (h <= stops[i + 1].t) {
            const t = (h - stops[i].t) / (stops[i + 1].t - stops[i].t);
            return {
                r: stops[i].r + t * (stops[i + 1].r - stops[i].r),
                g: stops[i].g + t * (stops[i + 1].g - stops[i].g),
                b: stops[i].b + t * (stops[i + 1].b - stops[i].b),
            };
        }
    }
    return stops[stops.length - 1];
}

function addTerrainLabels(scene, topics, heightmapData, terrainSize, heightScale, gridN, allEntityPositions) {
    // Collect labels at their ORIGINAL grid positions (no X/Z displacement)
    const labels = [];

    // Topic labels
    for (const t of topics) {
        const gx = t.gridPos ? t.gridPos.gx : Math.floor(gridN / 2);
        const gy = t.gridPos ? t.gridPos.gy : Math.floor(gridN / 2);
        const worldX = (gx / (gridN - 1) - 0.5) * terrainSize;
        const worldZ = (gy / (gridN - 1) - 0.5) * terrainSize;
        const rawH = (heightmapData.heightmap[gy] && heightmapData.heightmap[gy][gx]) || 0;
        const terrainY = rawH < 0.001 ? 0.3 : rawH * heightScale + 0.6;
        const truncLabel = t.label.length > 22 ? t.label.substring(0, 21) + '..' : t.label;
        labels.push({ text: truncLabel, x: worldX, y: terrainY, z: worldZ, major: t.height > 0.3 });
    }

    // NER entity labels
    if (allEntityPositions && allEntityPositions.length) {
        const topicNames = new Set(topics.map(t => t.label.toLowerCase()));
        for (const ent of allEntityPositions) {
            if (ent.is_topic || topicNames.has(ent.name.toLowerCase())) continue;
            const gx = ent.grid_gx, gy = ent.grid_gy;
            if (gx < 0 || gy < 0 || gy >= heightmapData.heightmap.length || gx >= heightmapData.heightmap[0].length) continue;
            const worldX = (gx / (gridN - 1) - 0.5) * terrainSize;
            const worldZ = (gy / (gridN - 1) - 0.5) * terrainSize;
            const rawH = (heightmapData.heightmap[gy] && heightmapData.heightmap[gy][gx]) || 0;
            const terrainY = rawH < 0.001 ? 0.15 : rawH * heightScale + 0.3;
            const truncName = ent.name.length > 20 ? ent.name.substring(0, 19) + '..' : ent.name;
            labels.push({ text: truncName, x: worldX, y: terrainY, z: worldZ, major: false });
        }
    }

    // Y-only stacking: when labels share similar X,Z, stack them vertically
    // Sort by Y descending so higher labels get placed first
    labels.sort((a, b) => b.y - a.y);
    for (let i = 0; i < labels.length; i++) {
        for (let j = 0; j < i; j++) {
            const dx = Math.abs(labels[i].x - labels[j].x);
            const dz = Math.abs(labels[i].z - labels[j].z);
            if (dx < 1.2 && dz < 1.2) {
                // Same location — bump Y up by 0.5 units
                labels[i].y = labels[j].y + 0.5;
            }
        }
    }

    // Render all labels
    for (const lb of labels) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 40;

        const fontSize = lb.major ? 16 : 11;
        const spriteScale = lb.major ? 4.0 : 2.5;
        const bgAlpha = lb.major ? 0.88 : 0.7;

        ctx.font = `${lb.major ? 'bold' : '600'} ${fontSize}px 'DM Sans', sans-serif`;
        const tm = ctx.measureText(lb.text);
        const bgW = Math.min(250, tm.width + 14);
        const bgX = 128 - bgW / 2;
        ctx.fillStyle = `rgba(255,255,252,${bgAlpha})`;
        ctx.beginPath();
        ctx.roundRect(bgX, 6, bgW, fontSize + 10, 5);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(lb.text, 128, 6 + (fontSize + 10) / 2);

        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true }));
        sprite.position.set(lb.x, lb.y, lb.z);
        sprite.scale.set(spriteScale, spriteScale * 40 / 256, 1);
        scene.add(sprite);
    }
}

function initWireframe() {
  const c = document.getElementById('container3d'), W = c.clientWidth, H = c.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
  camera.position.set(0, 38, 14);
  camera.lookAt(0,0,0);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  c.appendChild(renderer.domElement);

  const terrainSize = 30, heightScale = 8;

  if (HEIGHTMAP && HEIGHTMAP.heightmap) {
    const gridN = HEIGHTMAP.grid_size;
    // Sparse wireframe — every 6th vertex for clean shape
    const step = 6;
    const segsX = Math.floor((gridN - 1) / step);
    const segsY = Math.floor((gridN - 1) / step);

    // Solid dark surface underneath (so you can't see through)
    const solidGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, segsX, segsY);
    solidGeo.rotateX(-Math.PI / 2);
    const solidVerts = solidGeo.attributes.position;
    for (let i = 0; i < solidVerts.count; i++) {
        const ix = Math.round((i % (segsX + 1)) * step);
        const iy = Math.round(Math.floor(i / (segsX + 1)) * step);
        const cx = Math.min(ix, gridN - 1), cy = Math.min(iy, gridN - 1);
        const h = HEIGHTMAP.heightmap[cy] ? (HEIGHTMAP.heightmap[cy][cx] || 0) : 0;
        solidVerts.setY(i, h < 0.01 ? 0 : h * heightScale);
    }
    solidGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(solidGeo, new THREE.MeshBasicMaterial({
        color: 0x0a0a0a, side: THREE.DoubleSide
    })));

    // Wireframe overlay
    const wireGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, segsX, segsY);
    wireGeo.rotateX(-Math.PI / 2);
    const verts = wireGeo.attributes.position;
    const colors = new Float32Array(verts.count * 3);
    for (let i = 0; i < verts.count; i++) {
        const ix = Math.round((i % (segsX + 1)) * step);
        const iy = Math.round(Math.floor(i / (segsX + 1)) * step);
        const cx = Math.min(ix, gridN - 1), cy = Math.min(iy, gridN - 1);
        const h = HEIGHTMAP.heightmap[cy] ? (HEIGHTMAP.heightmap[cy][cx] || 0) : 0;
        verts.setY(i, h < 0.01 ? 0 : h * heightScale + 0.02);
        const brightness = 0.3 + h * 0.7;
        colors[i * 3] = brightness * 0.8;
        colors[i * 3 + 1] = brightness * 0.9;
        colors[i * 3 + 2] = brightness;
    }
    wireGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    scene.add(new THREE.Mesh(wireGeo, new THREE.MeshBasicMaterial({
        wireframe: true, vertexColors: true
    })));

    // Labels (white text on black, no background)
    for (const t of TOPICS) {
        const gx = t.gridPos ? t.gridPos.gx : Math.floor(gridN / 2);
        const gy = t.gridPos ? t.gridPos.gy : Math.floor(gridN / 2);
        const worldX = (gx / (gridN - 1) - 0.5) * terrainSize;
        const worldZ = (gy / (gridN - 1) - 0.5) * terrainSize;
        const rawH = (HEIGHTMAP.heightmap[gy] && HEIGHTMAP.heightmap[gy][gx]) || 0;
        if (rawH < 0.05) continue;
        const terrainY = rawH * heightScale + 0.5;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 32;
        ctx.font = 'bold 14px DM Sans, sans-serif';
        ctx.fillStyle = '#c0d8ff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const txt = t.label.length > 20 ? t.label.substring(0, 19) + '..' : t.label;
        ctx.fillText(txt, 128, 16);
        const tex = new THREE.CanvasTexture(canvas);
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
        sp.position.set(worldX, terrainY, worldZ);
        sp.scale.set(3.5, 3.5 * 32 / 256, 1);
        scene.add(sp);
    }
  }
  return {scene, camera, renderer};
}

function init3D() {
  const c = document.getElementById('container3d'), W = c.clientWidth, H = c.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xF0F0F0);
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
  camera.position.set(0, 38, 14);
  camera.lookAt(0,0,0);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  c.appendChild(renderer.domElement);

  // Lighting — strong ambient to eliminate facet shadows on low-res mesh
  scene.add(new THREE.AmbientLight(0xffffff, 0.85));
  const sun = new THREE.DirectionalLight(0xfff8f0, 0.4);
  sun.position.set(10, 30, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 1024;
  sun.shadow.mapSize.height = 1024;
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 60;
  sun.shadow.camera.left = -20;
  sun.shadow.camera.right = 20;
  sun.shadow.camera.top = 20;
  sun.shadow.camera.bottom = -20;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x88aacc, 0.3);
  fill.position.set(-6, 10, -8);
  scene.add(fill);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const terrainSize = 30;
  const heightScale = 8;

  if (HEIGHTMAP && HEIGHTMAP.heightmap) {
    const gridN = HEIGHTMAP.grid_size;

    const geo = new THREE.PlaneGeometry(terrainSize, terrainSize, gridN - 1, gridN - 1);
    geo.rotateX(-Math.PI / 2);

    const verts = geo.attributes.position;
    const colors = new Float32Array(verts.count * 3);

    // Simple: use heightmap values directly for color (already 0-1 from backend)
    for (let i = 0; i < verts.count; i++) {
        const ix = i % gridN;
        const iy = Math.floor(i / gridN);
        const h = HEIGHTMAP.heightmap[iy][ix];
        if (h < 0.01) {
            // Flat at ocean level — closes island sides against the water
            verts.setY(i, 0);
            colors[i * 3]     = 0.22;
            colors[i * 3 + 1] = 0.48;
            colors[i * 3 + 2] = 0.65;
        } else {
            verts.setY(i, h * heightScale);
            const col = terrainColorSmooth(h);
            colors[i * 3]     = col.r;
            colors[i * 3 + 1] = col.g;
            colors[i * 3 + 2] = col.b;
        }
    }

    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.computeVertexNormals();

    const terrainMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
        vertexColors: true, roughness: 0.95, metalness: 0.0,
        side: THREE.DoubleSide, flatShading: false
    }));
    terrainMesh.castShadow = true;
    terrainMesh.receiveShadow = true;
    scene.add(terrainMesh);

    // Ocean plane (blue, receives shadows)
    const groundGeo = new THREE.PlaneGeometry(120, 120);
    groundGeo.rotateX(-Math.PI / 2);
    const groundMesh = new THREE.Mesh(groundGeo, new THREE.MeshPhongMaterial({
        color: 0x3a7ca5, shininess: 60, specular: 0x4488aa, transparent: true, opacity: 0.9
    }));
    groundMesh.position.y = -0.02;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // Labels
    addTerrainLabels(scene, TOPICS, HEIGHTMAP, terrainSize, heightScale, gridN, ALL_ENTITY_POSITIONS);

  } else {
    // ── Fallback: client-side heightmap generation ─────────────────
    const dataXYLim = Math.max(...TOPICS.map(t=>Math.abs(t.x)),...TOPICS.map(t=>Math.abs(t.y)),0.3) * 1.2;
    const gridN = 200, spreadN = 1.66, fallbackHeightScale = 22;

    const grid = new Float32Array(gridN * gridN);
    for (const t of TOPICS) {
      const gx = (t.x + dataXYLim) / (2 * dataXYLim) * gridN;
      const gy = (t.y + dataXYLim) / (2 * dataXYLim) * gridN;
      const gr = Math.max(3, t.size / (2 * dataXYLim) * gridN * spreadN);
      const xS = Math.max(0, Math.floor(gx - gr)), xE = Math.min(gridN, Math.ceil(gx + gr));
      const yS = Math.max(0, Math.floor(gy - gr)), yE = Math.min(gridN, Math.ceil(gy + gr));
      for (let i = xS; i < xE; i++) {
        for (let j = yS; j < yE; j++) {
          const dist = Math.sqrt((i-gx)*(i-gx) + (j-gy)*(j-gy));
          if (dist < gr) {
            const val = (1 - dist*dist/(gr*gr)) * t.height;
            const idx = i * gridN + j;
            if (val > grid[idx]) grid[idx] = val;
          }
        }
      }
    }

    const maxGrid = Math.max(...grid) || 1;
    const geo = new THREE.PlaneGeometry(terrainSize, terrainSize, gridN-1, gridN-1);
    geo.rotateX(-Math.PI/2);
    const verts = geo.attributes.position, colors = new Float32Array(verts.count * 3);
    for (let i = 0; i < verts.count; i++) {
      const ix = i % gridN, iy = Math.floor(i / gridN);
      const h = grid[iy * gridN + ix];
      const hNorm = h / maxGrid;
      verts.setY(i, hNorm * heightScale);
      const co = terrainColorSmooth(hNorm);
      colors[i*3]=co.r; colors[i*3+1]=co.g; colors[i*3+2]=co.b;
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.computeVertexNormals();
    scene.add(new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
        vertexColors: true, shininess: 8, specular: 0x111111,
        side: THREE.DoubleSide, flatShading: false
    })));

    // Ocean plane (fallback)
    const groundGeo2 = new THREE.PlaneGeometry(120, 120);
    groundGeo2.rotateX(-Math.PI / 2);
    const gm2 = new THREE.Mesh(groundGeo2, new THREE.MeshPhongMaterial({ color: 0x3a7ca5, shininess: 60, specular: 0x4488aa, transparent: true, opacity: 0.9 }));
    gm2.position.y = -0.1;
    scene.add(gm2);

    // Labels (fallback)
    for (const t of TOPICS) {
      if (t.height < 0.04) continue;
      const cv = document.createElement('canvas'), cx = cv.getContext('2d'); cv.width=512; cv.height=72; cx.clearRect(0,0,512,72);
      const fs = t.height>0.2?26:t.height>0.1?21:16;
      cx.font = `bold ${fs}px 'DM Sans',sans-serif`;
      const tm = cx.measureText(t.label), bw = Math.min(500, tm.width+20), bx = 256-bw/2;
      cx.fillStyle = 'rgba(255,255,245,0.75)'; cx.beginPath(); cx.roundRect(bx,10,bw,fs+14,6); cx.fill();
      cx.fillStyle = '#2a2a20'; cx.textAlign = 'center'; cx.textBaseline = 'middle'; cx.fillText(t.label, 256, 10+(fs+14)/2);
      const tex = new THREE.CanvasTexture(cv);
      const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
      const sx = ((t.x+dataXYLim)/(2*dataXYLim) - 0.5) * terrainSize;
      const sz = -((t.y+dataXYLim)/(2*dataXYLim) - 0.5) * terrainSize;
      sp.position.set(sx, t.height*fallbackHeightScale+2, sz); sp.scale.set(7,1,1); scene.add(sp);
    }

  }

  return {scene, camera, renderer};
}

// ═══════════════════════════════════════════════════════════════════════
// 3D CONTROLS — orbit + fly
// ═══════════════════════════════════════════════════════════════════════
let orbit = {drag:false, lx:0, ly:0, theta:.3, phi:.35, dist:40};
function updateOrbit(cam) { cam.position.x=orbit.dist*Math.sin(orbit.phi)*Math.sin(orbit.theta); cam.position.y=orbit.dist*Math.cos(orbit.phi); cam.position.z=orbit.dist*Math.sin(orbit.phi)*Math.cos(orbit.theta); cam.lookAt(0,0,0); }
function attachOrbit(cam, el) {
  updateOrbit(cam);
  el.addEventListener('mousedown', e=>{orbit.drag=true;orbit.lx=e.clientX;orbit.ly=e.clientY});
  el.addEventListener('mouseup', ()=>orbit.drag=false); el.addEventListener('mouseleave', ()=>orbit.drag=false);
  el.addEventListener('mousemove', e=>{if(!orbit.drag||(currentMode!=='3d'&&currentMode!=='wire'))return;orbit.theta+=(e.clientX-orbit.lx)*.005;orbit.phi=Math.max(.1,Math.min(Math.PI*.48,orbit.phi-(e.clientY-orbit.ly)*.005));orbit.lx=e.clientX;orbit.ly=e.clientY;updateOrbit(cam)});
  el.addEventListener('wheel', e=>{if(currentMode!=='3d'&&currentMode!=='wire')return;orbit.dist=Math.max(5,Math.min(50,orbit.dist+e.deltaY*.015));updateOrbit(cam);e.preventDefault()}, {passive:false});
}
const flyK={}, flyM={drag:false,x:0,y:0};
function attachFly(cam, el) {
  window.addEventListener('keydown', e=>{flyK[e.key.toLowerCase()]=true}); window.addEventListener('keyup', e=>{flyK[e.key.toLowerCase()]=false});
  el.addEventListener('mousedown', e=>{flyM.drag=true;flyM.x=e.clientX;flyM.y=e.clientY});
  el.addEventListener('mouseup', ()=>flyM.drag=false); el.addEventListener('mouseleave', ()=>flyM.drag=false);
  el.addEventListener('mousemove', e=>{if(!flyM.drag||currentMode!=='fly')return;cam.rotation.order='YXZ';cam.rotation.y-=(e.clientX-flyM.x)*.003;cam.rotation.x=Math.max(-Math.PI/3,Math.min(Math.PI/3,cam.rotation.x-(e.clientY-flyM.y)*.003));flyM.x=e.clientX;flyM.y=e.clientY});
}
function tickFly(cam) { if(currentMode!=='fly')return;const s=.14,d=new THREE.Vector3;cam.getWorldDirection(d);const r=new THREE.Vector3().crossVectors(d,cam.up).normalize();if(flyK.w||flyK.arrowup)cam.position.addScaledVector(d,s);if(flyK.s||flyK.arrowdown)cam.position.addScaledVector(d,-s);if(flyK.a||flyK.arrowleft)cam.position.addScaledVector(r,-s);if(flyK.d||flyK.arrowright)cam.position.addScaledVector(r,s);if(flyK.q)cam.position.y+=s*.6;if(flyK.e)cam.position.y-=s*.6; }

// ═══════════════════════════════════════════════════════════════════════
// DEBUG TABLE
// ═══════════════════════════════════════════════════════════════════════
function renderDebugTable(){
  if(!lastData)return;const dv=document.getElementById('debug-view');let html='';
  html+='<div class="debug-section"><h3>Named Entities ('+lastData.entities.length+')</h3><table class="debug-table"><tr><th>#</th><th>Entity</th><th>Type</th><th>Confidence</th></tr>';
  lastData.entities.forEach((e,i)=>{html+='<tr><td class="num">'+(i+1)+'</td><td>'+e.name+'</td><td>'+e.type+'</td><td class="num '+(e.confidence>0.5?'high':'mid')+'">'+e.confidence.toFixed(3)+'</td></tr>'});
  html+='</table></div>';
  if(lastData.debug&&lastData.debug.length){
    html+='<div class="debug-section"><h3>Pipeline Debug ('+lastData.debug.length+')</h3><table class="debug-table"><tr><th>#</th><th>Topic</th><th>Source</th><th>Tag</th><th>Cluster</th><th>Salience</th><th>Size</th><th>TF-IDF Sim</th><th>Height</th><th>X</th><th>Y</th></tr>';
    lastData.debug.forEach((d,i)=>{html+='<tr><td class="num">'+(i+1)+'</td><td>'+d.title+'</td><td>'+d.source+'</td><td>'+(d.tag||'')+'</td><td class="num">'+(d.cluster||'')+'</td><td class="num">'+(d.salience||0).toFixed(4)+'</td><td class="num">'+(d.size||0).toFixed(4)+'</td><td class="num">'+(d.tfidf_sim||0).toFixed(4)+'</td><td class="num">'+(d.height||0).toFixed(4)+'</td><td class="num">'+(d.x_final||d.x||0)+'</td><td class="num">'+(d.y_final||d.y||0)+'</td></tr>'});
    html+='</table></div>';
  }
  html+='<div class="debug-section"><h3>D3 Entities ('+RAW_ENTITIES.length+' total)</h3><table class="debug-table"><tr><th>#</th><th>Entity</th><th>Tag</th><th>Cluster</th><th>Size</th><th>X</th><th>Y</th></tr>';
  RAW_ENTITIES.forEach((e,i)=>{html+='<tr><td class="num">'+(i+1)+'</td><td>'+e.entity+'</td><td>'+e.tag+'</td><td class="num">'+e.cluster+'</td><td class="num">'+e.size.toFixed(4)+'</td><td class="num">'+e.x.toFixed(4)+'</td><td class="num">'+e.y.toFixed(4)+'</td></tr>'});
  html+='</table></div>';
  dv.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════════════════
// SUMMARY VIEW
// ═══════════════════════════════════════════════════════════════════════
function renderSummary(){
  if(!lastData)return;
  const sv=document.getElementById('summary-view');
  const meta=lastData.metadata||{};
  const words=meta.word_count||0;
  const entCount=meta.entities_found||0;
  const topicCount=meta.topics_final||0;
  const timeMs=meta.processing_time_ms||0;

  let html='<div class="summary-cards">';
  html+='<div class="summary-card"><div class="value">'+words+'</div><div class="label">Words</div></div>';
  html+='<div class="summary-card"><div class="value">'+entCount+'</div><div class="label">Entities</div></div>';
  html+='<div class="summary-card"><div class="value">'+topicCount+'</div><div class="label">Topics</div></div>';
  html+='<div class="summary-card"><div class="value">'+timeMs+'ms</div><div class="label">Processing Time</div></div>';
  html+='</div>';

  // Top 5 entities by confidence
  if(lastData.entities&&lastData.entities.length){
    const topEnts=lastData.entities.slice().sort((a,b)=>(b.confidence||0)-(a.confidence||0)).slice(0,5);
    html+='<div class="summary-section"><h3>Top 5 Entities</h3><table class="summary-table"><tr><th>#</th><th>Entity</th><th>Type</th><th>Confidence</th></tr>';
    topEnts.forEach((e,i)=>{html+='<tr><td>'+(i+1)+'</td><td>'+e.name+'</td><td>'+e.type+'</td><td>'+(e.confidence||0).toFixed(3)+'</td></tr>'});
    html+='</table></div>';
  }

  // Top 5 topics by size
  if(RAW_ENTITIES.length){
    const topTopics=RAW_ENTITIES.slice().sort((a,b)=>(b.size||0)-(a.size||0)).slice(0,5);
    html+='<div class="summary-section"><h3>Top 5 Topics</h3><table class="summary-table"><tr><th>#</th><th>Topic</th><th>Tag</th><th>Cluster</th><th>Size</th></tr>';
    topTopics.forEach((t,i)=>{html+='<tr><td>'+(i+1)+'</td><td>'+t.entity+'</td><td>'+t.tag+'</td><td>'+t.cluster+'</td><td>'+(t.size||0).toFixed(4)+'</td></tr>'});
    html+='</table></div>';
  }

  // Cluster breakdown
  if(RAW_ENTITIES.length){
    const clusters={};
    RAW_ENTITIES.forEach(e=>{if(!clusters[e.cluster])clusters[e.cluster]=0;clusters[e.cluster]++});
    const clusterKeys=Object.keys(clusters).sort((a,b)=>a-b);
    html+='<div class="summary-section"><h3>Cluster Breakdown</h3><table class="summary-table"><tr><th>Cluster</th><th>Entity Count</th></tr>';
    clusterKeys.forEach(k=>{html+='<tr><td>Group '+k+'</td><td>'+clusters[k]+'</td></tr>'});
    html+='</table></div>';
  }

  sv.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════════════════════════════════════════════
const hints={'2d':'Hover over entities · Scroll to zoom','3d':'Drag to orbit · Scroll to zoom','fly':'WASD move · Mouse look · Q/E altitude','force':'Drag nodes · Fisheye on hover','wire':'Drag to orbit · Scroll to zoom','debug':'Entity data table','summary':'Analysis summary overview'};
function switchMode(mode){
  currentMode=mode;
  document.getElementById('hint').textContent=hints[mode]||'';
  document.querySelectorAll('#mode-switcher button').forEach((b,i)=>b.classList.toggle('active',['2d','3d','fly','force','wire','debug','summary'][i]===mode));
  renderCurrent();
}

function renderCurrent(){
  if(!TOPICS.length&&!RAW_ENTITIES.length)return;
  const views=['scatter2d','container3d','forceGraph'];
  views.forEach(id=>{document.getElementById(id).style.display='none'});
  document.getElementById('debug-view').classList.remove('active');
  document.getElementById('summary-view').classList.remove('active');
  if(animFrame)cancelAnimationFrame(animFrame);

  if(currentMode==='summary'){document.getElementById('summary-view').classList.add('active');renderSummary();return}
  if(currentMode==='debug'){document.getElementById('debug-view').classList.add('active');renderDebugTable();return}
  if(currentMode==='2d'){document.getElementById('scatter2d').style.display='block';render2DScatter();return}
  if(currentMode==='force'){document.getElementById('forceGraph').style.display='block';renderForceGraph();return}

  // 3D, fly, or wireframe — all use Three.js
  const c3=document.getElementById('container3d');c3.style.display='block';c3.innerHTML='';

  if(currentMode==='wire'){
    const{scene,camera,renderer}=initWireframe();
    attachOrbit(camera,renderer.domElement);
    orbit={drag:false,lx:0,ly:0,theta:.3,phi:.35,dist:40};updateOrbit(camera);
    c3.focus();
    function animW(){animFrame=requestAnimationFrame(animW);renderer.render(scene,camera)}animW();
    window.onresize=()=>{camera.aspect=c3.clientWidth/c3.clientHeight;camera.updateProjectionMatrix();renderer.setSize(c3.clientWidth,c3.clientHeight)};
    return;
  }

  const{scene,camera,renderer}=init3D(); attachOrbit(camera,renderer.domElement); attachFly(camera,renderer.domElement);
  if(currentMode==='3d'){orbit={drag:false,lx:0,ly:0,theta:.3,phi:.35,dist:40};updateOrbit(camera)}
  else{camera.position.set(-12,6,18);camera.rotation.order='YXZ';camera.lookAt(0,3,0)}
  c3.focus();
  function anim(){animFrame=requestAnimationFrame(anim);tickFly(camera);renderer.render(scene,camera)}anim();
  window.onresize=()=>{camera.aspect=c3.clientWidth/c3.clientHeight;camera.updateProjectionMatrix();renderer.setSize(c3.clientWidth,c3.clientHeight)};
}
</script>
